<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PicTour v0.4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap');
:root {
  --bg:#ffffff;
  --surface:#f8f8f8;
  --surface2:#efefef;
  --border:#e0e0e0;
  --border2:#cccccc;
  --text:#111111;
  --muted:#888888;
  --accent:#111111;
  --neon-green:#4caf50;
  --neon-pink:#e91e8c;
  --neon-blue:#2196f3;
  --wrong:#ff3333;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;}

/* ── HEADER ── */
header{
  width:100%;max-width:700px;
  padding:14px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.app-title{
  font-size:18px;font-weight:900;letter-spacing:0.06em;
  color:var(--text);
}
.app-version{font-size:10px;color:var(--muted);margin-right:5px;}
.back-btn{
  background:none;border:1.5px solid var(--border2);
  border-radius:8px;padding:5px 12px;
  font-family:'Heebo',sans-serif;font-size:12px;
  color:var(--muted);cursor:pointer;
}
.back-btn:hover{border-color:var(--text);color:var(--text);}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:700px;flex:1;min-height:0;}
.screen.active{display:flex;}

/* ── LOADING ── */
#loading-screen{justify-content:center;gap:16px;padding:30px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-text{font-size:14px;color:var(--muted);}

/* ── TOPIC SCREEN ── */
#topic-screen{padding:20px 16px;gap:12px;overflow-y:auto;}
.screen-title{font-size:20px;font-weight:900;text-align:right;width:100%;}
.screen-sub{font-size:13px;color:var(--muted);text-align:right;width:100%;}
.topic-list{width:100%;display:flex;flex-direction:column;gap:7px;}
.topic-item{
  width:100%;padding:13px 16px;
  border-radius:10px;border:1.5px solid var(--border);
  background:var(--bg);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:border-color 0.15s,background 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.topic-item:hover{border-color:var(--border2);}
.topic-item.selected{border-color:var(--text);background:var(--surface);}
.topic-name{font-size:14px;font-weight:700;}
.topic-count{font-size:11px;color:var(--muted);}
.check-circle{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;transition:all 0.15s;
}
.topic-item.selected .check-circle{
  background:var(--text);border-color:var(--text);color:#fff;
}
.btn-primary{
  width:100%;padding:14px;border-radius:10px;
  border:none;background:var(--text);color:#fff;
  font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:opacity 0.15s;
}
.btn-primary:disabled{opacity:0.25;pointer-events:none;}
.btn-secondary{
  width:100%;padding:11px;border-radius:10px;
  border:1.5px solid var(--border2);background:none;
  font-family:'Heebo',sans-serif;font-size:13px;color:var(--muted);
  cursor:pointer;
}
.btn-secondary:hover{border-color:var(--text);color:var(--text);}

/* ── MODE SCREEN ── */
#mode-screen{padding:24px 16px;gap:12px;justify-content:center;}
.mode-btn{
  width:100%;padding:22px 20px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--surface);
  font-family:'Heebo',sans-serif;font-size:17px;font-weight:700;
  cursor:pointer;text-align:right;transition:border-color 0.15s,background 0.15s;
}
.mode-btn:hover{border-color:var(--text);}
.mode-sub{font-size:12px;color:var(--muted);font-weight:400;margin-top:3px;}

/* ── QUIZ OPTIONS ── */
#quiz-options-screen{padding:24px 16px;gap:14px;overflow-y:auto;}
.qt-btn{
  width:100%;padding:13px 16px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--surface);
  font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;color:var(--text);text-align:right;
  transition:border-color 0.15s;
}
.qt-btn.selected{border-color:var(--text);background:var(--bg);}
.section-label{font-size:11px;color:var(--muted);text-align:right;width:100%;letter-spacing:0.06em;text-transform:uppercase;}
.count-row{display:flex;gap:6px;flex-wrap:wrap;width:100%;}
.count-btn{
  padding:8px 14px;border-radius:8px;
  border:1.5px solid var(--border);background:none;
  font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;color:var(--muted);
}
.count-btn.active{border-color:var(--text);color:var(--text);background:var(--surface);}

/* ── APP SCREEN ── */
#app-screen{padding:10px 14px;gap:8px;}
.progress-row{width:100%;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.progress-bar{flex:1;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--text);border-radius:2px;transition:width 0.4s;}
.progress-label{font-size:11px;color:var(--muted);min-width:44px;text-align:left;}
.score-row{width:100%;display:flex;gap:16px;font-size:12px;color:var(--muted);flex-shrink:0;}
.score-row span{color:var(--text);font-weight:700;}
.card-wrap{
  width:100%;flex:1;position:relative;
  touch-action:none;min-height:0;
  overflow:hidden;border-radius:14px;
}
.card-face{
  position:absolute;inset:0;border-radius:14px;
  border:1.5px solid var(--border);overflow:hidden;
  transition:opacity 0.25s;
}
.card-front{background:#fff;display:flex;align-items:center;justify-content:center;opacity:1;z-index:2;}
.card-front img{
  width:100%;height:100%;object-fit:contain;display:block;
  transform-origin:center center;will-change:transform;
}
.card-back{
  background:var(--surface);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  padding:28px;opacity:0;z-index:1;
}
.card-wrap.flipped .card-front{opacity:0;z-index:1;}
.card-wrap.flipped .card-back{opacity:1;z-index:2;}
.answer-text{font-size:clamp(18px,4vw,30px);font-weight:700;text-align:center;line-height:1.3;color:var(--text);}
.flip-label{font-size:11px;color:var(--muted);}
.hint-row{
  flex-shrink:0;text-align:center;width:100%;
  font-size:11px;color:#bbb;padding:2px 0;
  transition:color 0.4s;
}
.hint-row.used{color:var(--surface2);}
.flash-actions{width:100%;display:flex;gap:8px;flex-shrink:0;}
.btn-card{
  flex:1;padding:11px 6px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg);
  font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;color:var(--muted);transition:all 0.15s;
}
.btn-card.good{border-color:var(--neon-green);color:#1a8a00;}
.btn-card.bad{border-color:var(--border2);color:var(--muted);}
.quiz-grid{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:5px;flex-shrink:0;}
.quiz-opt{
  padding:8px 4px;border-radius:8px;
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--text);font-family:'Heebo',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;
  text-align:center;line-height:1.3;transition:all 0.15s;
}
.quiz-opt.selected{border-color:#2196f3;background:rgba(33,150,243,0.07);color:#1565c0;}
.quiz-opt.correct{border-color:#4caf50;background:rgba(76,175,80,0.08);color:#2e7d32;}
.quiz-opt.wrong{border-color:#e53935;background:rgba(229,57,53,0.08);color:#c62828;}
.quiz-opt.disabled{cursor:default;}
.quiz-actions{width:100%;display:flex;gap:8px;flex-shrink:0;}
.btn-continue{
  flex:1;padding:11px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg);
  font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;color:var(--muted);transition:all 0.15s;
}
.btn-continue.ready{
  background:var(--neon-blue);border-color:var(--neon-blue);
  color:#003a4a;
  
}
.btn-skip{
  padding:11px 18px;border-radius:10px;
  border:1.5px solid var(--border);background:none;
  font-family:'Heebo',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;
}

/* ── DONE ── */
#done-screen{padding:30px 20px;gap:16px;justify-content:center;text-align:center;overflow-y:auto;}
.done-score{font-size:60px;font-weight:900;color:var(--text);}
.done-sub{font-size:13px;color:var(--muted);}
.done-history{width:100%;max-width:320px;max-height:150px;overflow-y:auto;}
.done-cta{display:flex;flex-direction:column;gap:8px;width:100%;max-width:280px;}

/* ── ANIMATIONS ── */
@keyframes checkPop{
  0%{opacity:0;transform:scale(0.1);}
  35%{opacity:1;transform:scale(1.4);}
  55%{transform:scale(0.9);}
  75%{opacity:1;transform:scale(1.1);}
  100%{opacity:0;transform:scale(1) translateY(-30px);}
}
@keyframes xPop{
  0%{opacity:0;transform:scale(0.1);}
  35%{opacity:1;transform:scale(1.3);}
  55%{transform:scale(0.9);}
  75%{opacity:1;}
  100%{opacity:0;transform:scale(1) translateY(-20px);}
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@media(max-width:500px){.quiz-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header style="direction:ltr;">
  <div style="display:flex;align-items:baseline;gap:0">
    <span class="app-title">PicTour</span><span class="app-version">v0.4</span>
  </div>
  <button id="home-btn" onclick="goHome()" style="display:none;background:none;border:none;cursor:pointer;padding:4px;opacity:0.35;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
  </button>
</header>

<!-- LOADING -->
<div id="loading-screen" class="screen active">
  <div class="spinner"></div>
  <div id="loading-text">טוען נושאים...</div>
</div>

<!-- TOPIC -->
<div id="topic-screen" class="screen">
  <div style="width:100%;padding:16px 16px 0;display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
    <div class="screen-title">בחר נושא</div>
    <div class="screen-sub">אפשר לבחור יותר מאחד</div>
  </div>
  <div style="width:100%;flex:1;overflow-y:auto;padding:10px 16px 16px;">
    <div class="topic-list" id="topic-list"></div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px;">
      <button class="btn-secondary" onclick="toggleAll()">בחר הכל</button>
      <button class="btn-primary" id="topic-continue-btn" onclick="goToMode()" disabled>המשך</button>
    </div>
  </div>
</div>

<!-- MODE -->
<div id="mode-screen" class="screen">
  <div style="width:100%;padding:24px 16px;display:flex;flex-direction:column;gap:12px;">
    <div class="screen-title">איך תרצה ללמוד?</div>
    <button class="mode-btn" onclick="startCards()">
      כרטיסיות
      <div class="mode-sub">הפוך, בדוק את עצמך</div>
    </button>
    <button class="mode-btn" onclick="goToQuizOptions()">
      בוחן
      <div class="mode-sub">שאלות + תשובות</div>
    </button>
  </div>
</div>

<!-- QUIZ OPTIONS -->
<div id="quiz-options-screen" class="screen">
  <div style="width:100%;padding:24px 16px;display:flex;flex-direction:column;gap:14px;">
    <div class="screen-title">הגדרות בוחן</div>
    <div class="section-label">סוג שאלות</div>
    <div style="display:flex;flex-direction:column;gap:7px;">
      <button class="qt-btn selected" id="qt-closed" onclick="setQuizType('closed')">סגור — 4 אפשרויות</button>
      <button class="qt-btn" id="qt-open" onclick="setQuizType('open')">פתוח — הקלדה חופשית</button>
    </div>
    <div class="section-label">כמה שאלות?</div>
    <div class="count-row">
      <button onclick="setQuizCount(10,this)" class="count-btn active">10</button>
      <button onclick="setQuizCount(20,this)" class="count-btn">20</button>
      <button onclick="setQuizCount(30,this)" class="count-btn">30</button>
      <button onclick="setQuizCount(40,this)" class="count-btn">40</button>
      <button onclick="setQuizCount(50,this)" class="count-btn">50</button>
      <button onclick="setQuizCount(9999,this)" class="count-btn">הכל</button>
    </div>
    <button class="btn-primary" onclick="startQuiz()">התחל בוחן</button>
    <button class="btn-secondary" onclick="showScreen('mode-screen')">חזרה</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">0 / 0</div>
  </div>
  <div class="score-row" id="score-row" style="display:none">
    נכון: <span id="score-correct">0</span>&nbsp;&nbsp;שגוי: <span id="score-wrong">0</span>
  </div>
  <div class="card-wrap" id="card-wrap">
    <div class="card-face card-front" id="card-front">
      <img id="card-img" src="" alt="">
    </div>
    <div class="card-face card-back">
      <div class="flip-label">תשובה</div>
      <div class="answer-text" id="card-answer"></div>
    </div>
  </div>
  <div class="hint-row" id="hint-row">החלק שמאל/ימין • דאבל קליק להגדלה</div>
  <div class="quiz-grid" id="quiz-options" style="display:none"></div>
  <div class="flash-actions" id="flash-actions">
    <button class="btn-card bad" onclick="markWrong()">שאל שוב</button>
    <button class="btn-card good" onclick="markCorrect()">✓ ידעתי</button>
  </div>
  <div class="quiz-actions" id="quiz-actions" style="display:none">
    <button class="btn-skip" onclick="skipCard()">דלג</button>
    <button class="btn-continue" id="confirm-btn" onclick="confirmQuiz()">המשך</button>
  </div>
</div>

<!-- DONE -->
<div id="done-screen" class="screen">
  <div style="font-size:24px;font-weight:900;">סיימת!</div>
  <div class="done-score" id="done-score"></div>
  <div class="done-sub" id="done-sub"></div>
  <div class="done-history" id="done-history"></div>
  <div class="done-cta" id="done-cta"></div>
</div>

<script>
// ── CONFIG ──
const GITHUB_API = 'https://api.github.com/repos/barakclinic-ship-it/PicTour/contents/images';
const BASE_URL   = 'https://barakclinic-ship-it.github.io/PicTour/images';
const VALID_EXT  = /\.(jpg|jpeg|png|gif|webp)$/i;

// ── STATE ──
let topics = [], selectedTopics = new Set(), allCards = [];
let deck = [], repeatQueue = [], current = null;
let seen = 0, roundTotal = 0;
let mode = 'quiz', quizType = 'closed', quizCount = 10;
let scores = {correct:0, wrong:0};
let quizHistory = [];
let quizAnswered = false, selectedQuizBtn = null;
let autoTimer = null;
let hintShown = localStorage.getItem('pictour_hint') === '1';

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('home-btn').style.display =
    (id === 'loading-screen' || id === 'topic-screen') ? 'none' : '';
}

function goHome() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  const wp = document.getElementById('wrong-popup'); if (wp) wp.remove();
  showScreen('topic-screen');
}

// ── LOAD FROM GITHUB ──
async function loadTopics() {
  showScreen('loading-screen');
  document.getElementById('loading-text').textContent = 'טוען נושאים...';
  try {
    const res = await fetch(GITHUB_API, {headers:{'Accept':'application/vnd.github.v3+json'}});
    if (!res.ok) throw new Error('GitHub error: ' + res.status);
    const items = await res.json();

    const subdirs = items.filter(i => i.type === 'dir');
    topics = [];

    for (const dir of subdirs) {
      document.getElementById('loading-text').textContent = 'טוען ' + dir.name + '...';
      const r = await fetch(dir.url, {headers:{'Accept':'application/vnd.github.v3+json'}});
      if (!r.ok) continue;
      const files = (await r.json()).filter(i => i.type==='file' && VALID_EXT.test(i.name));
      if (files.length) {
        topics.push({
          name: dir.name,
          images: files.map(f => ({
            file: dir.name + '/' + f.name,
            name: f.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').trim()
          }))
        });
      }
    }

    if (!topics.length) throw new Error('לא נמצאו תמונות');
    renderTopics();
    showScreen('topic-screen');
  } catch(err) {
    document.getElementById('loading-text').textContent = '❌ ' + err.message;
    const btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.style.cssText = 'margin-top:16px;max-width:200px;';
    btn.textContent = 'נסה שוב';
    btn.onclick = loadTopics;
    document.getElementById('loading-screen').appendChild(btn);
  }
}

function renderTopics() {
  const list = document.getElementById('topic-list');
  list.innerHTML = '';
  topics.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'topic-item';
    el.innerHTML = `
      <div>
        <div class="topic-name">${t.name}</div>
        <div class="topic-count">${t.images.length} תמונות</div>
      </div>
      <div class="check-circle">✓</div>`;
    el.onclick = () => {
      if (selectedTopics.has(i)) { selectedTopics.delete(i); el.classList.remove('selected'); }
      else { selectedTopics.add(i); el.classList.add('selected'); }
      document.getElementById('topic-continue-btn').disabled = selectedTopics.size === 0;
    };
    list.appendChild(el);
  });
}

function toggleAll() {
  if (selectedTopics.size === topics.length) {
    selectedTopics.clear();
    document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('selected'));
  } else {
    topics.forEach((_, i) => selectedTopics.add(i));
    document.querySelectorAll('.topic-item').forEach(el => el.classList.add('selected'));
  }
  document.getElementById('topic-continue-btn').disabled = selectedTopics.size === 0;
}

function goToMode() {
  allCards = [];
  selectedTopics.forEach(idx => {
    topics[idx].images.forEach(img => {
      allCards.push({
        name: img.name,
        url: BASE_URL + '/' + img.file.split('/').map(encodeURIComponent).join('/')
      });
    });
  });
  showScreen('mode-screen');
}

// ── MODE ──
function startCards() { mode = 'flash'; startRound(); showTutorial(); }
function goToQuizOptions() { mode = 'quiz'; showScreen('quiz-options-screen'); }
function startQuiz() { startRound(); }

function setQuizType(type) {
  quizType = type;
  document.querySelectorAll('.qt-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('qt-'+type).classList.add('selected');
}

function setQuizCount(n, btn) {
  quizCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ── ROUND ──
function startRound() {
  showScreen('app-screen');
  let pool = shuffle([...allCards]);
  if (quizCount < pool.length) pool = pool.slice(0, quizCount);
  deck = pool; roundTotal = pool.length;
  repeatQueue = []; seen = 0;
  scores = {correct:0, wrong:0};
  updateScoreRow();
  pickNext();
}

function pickNext() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  const wp = document.getElementById('wrong-popup'); if (wp) wp.remove();
  if (deck.length === 0) {
    if (mode === 'flash' && repeatQueue.length > 0) {
      deck = shuffle([...repeatQueue]); repeatQueue = [];
    } else { showDone(); return; }
  }
  const i = Math.floor(Math.random() * deck.length);
  current = deck.splice(i, 1)[0];
  seen++;
  showCard();
}

function showCard() {
  resetZoom();
  document.getElementById('card-wrap').classList.remove('flipped');
  document.getElementById('card-img').src = current.url;
  document.getElementById('card-answer').textContent = current.name;
  updateProgress();

  if (mode === 'flash') {
    document.getElementById('quiz-options').style.display = 'none';
    document.getElementById('flash-actions').style.display = 'flex';
    document.getElementById('quiz-actions').style.display = 'none';
    document.getElementById('score-row').style.display = 'none';
  } else {
    document.getElementById('flash-actions').style.display = 'none';
    document.getElementById('quiz-actions').style.display = 'flex';
    document.getElementById('score-row').style.display = 'flex';
    quizAnswered = false; selectedQuizBtn = null;
    const cb = document.getElementById('confirm-btn');
    cb.className = 'btn-continue';
    cb.textContent = 'המשך'; cb.onclick = confirmQuiz;
    buildQuizOptions();
    document.getElementById('quiz-options').style.display = 'grid';
  }
}

function markCorrect() { showCheckmark(); autoTimer = setTimeout(pickNext, 650); }
function markWrong() { repeatQueue.push(current); pickNext(); }
function skipCard() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  const wp = document.getElementById('wrong-popup'); if (wp) wp.remove();
  deck.push(current); pickNext();
}

// ── QUIZ OPTIONS ──
function buildQuizOptions() {
  const pool = allCards.filter(c => c !== current);
  const stop = new Set(['of','the','and','or','a','an','left','right','upper','lower','anterior','posterior','medial','lateral','superior','inferior']);
  const kw = name => name.toLowerCase().split(/\s+/).filter(w => w.length>2 && !stop.has(w));
  const ckw = kw(current.name);
  const sim = c => kw(c.name).filter(w => ckw.includes(w)).length;
  const scored = shuffle([...pool]).map(c => ({c, s:sim(c)}));
  scored.sort((a,b) => b.s - a.s);
  const opts = shuffle([current, ...scored.slice(0,3).map(s=>s.c)]);
  const container = document.getElementById('quiz-options');
  container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt.name;
    btn.dataset.correct = opt === current ? '1' : '0';
    btn.onclick = () => {
      if (quizAnswered) return;
      document.querySelectorAll('.quiz-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedQuizBtn = btn;
      const cb = document.getElementById('confirm-btn');
      cb.className = 'btn-continue ready';
    };
    container.appendChild(btn);
  });
}

function confirmQuiz() {
  if (quizAnswered || !selectedQuizBtn) return;
  quizAnswered = true;
  const isCorrect = selectedQuizBtn.dataset.correct === '1';
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.classList.add('disabled'); b.classList.remove('selected');
    if (b.dataset.correct === '1') b.classList.add('correct');
  });
  if (!isCorrect) selectedQuizBtn.classList.add('wrong');
  const cb = document.getElementById('confirm-btn');
  if (isCorrect) {
    scores.correct++; updateScoreRow();
    showCheckmark();
    cb.textContent = 'הבא →';
    cb.className = 'btn-continue ready';
    cb.onclick = () => pickNext();
    autoTimer = setTimeout(pickNext, 950);
  } else {
    scores.wrong++; updateScoreRow();
    cb.textContent = 'הבנתי';
    cb.className = 'btn-continue';
    cb.style.cssText = 'flex:1;padding:11px;border-radius:10px;border:1.5px solid #e53935;background:rgba(229,57,53,0.08);font-family:Heebo,sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:#c62828;';
    cb.onclick = () => { const wp=document.getElementById('wrong-popup');if(wp)wp.remove(); pickNext(); };
    autoTimer = setTimeout(() => showWrongPopup(current.name), 500);
  }
}

// ── DONE ──
function showDone() {
  showScreen('done-screen');
  const counts = [10,20,30,40,50];
  const idx = counts.indexOf(roundTotal);
  if (mode === 'quiz') {
    const total = scores.correct + scores.wrong;
    const pct = total ? Math.round(scores.correct/total*100) : 0;
    const emoji = pct===100?'👑':pct>=90?'🌟':pct>=75?'🔥':pct>=60?'💪':pct>=40?'😅':'💀';
    quizHistory.push({count:roundTotal, pct, emoji});
    document.getElementById('done-score').textContent = pct + '%';
    document.getElementById('done-sub').textContent = scores.correct + ' נכון מתוך ' + total;
    const hist = quizHistory.slice().reverse().map((h,i) =>
      `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
        <span style="color:var(--muted)">${quizHistory.length-i}. ${h.count} שאלות</span>
        <span style="font-weight:700">${h.pct}% ${h.emoji}</span>
      </div>`).join('');
    document.getElementById('done-history').innerHTML = hist;
    let nextHtml = '';
    if (idx>=0 && idx<counts.length-1)
      nextHtml = `<button class="btn-primary" style="background:#111" onclick="quizCount=${counts[idx+1]};startQuiz()">מדרגה הבאה — ${counts[idx+1]} שאלות ↑</button>`;
    document.getElementById('done-cta').innerHTML = nextHtml +
      `<button class="btn-primary" onclick="startQuiz()">שחק שוב — ${roundTotal} שאלות</button>` +
      `<button class="btn-secondary" onclick="goHome()">בחר נושא אחר</button>`;
  } else {
    document.getElementById('done-score').textContent = '✓';
    document.getElementById('done-sub').textContent = 'עברת על ' + seen + ' כרטיסיות';
    document.getElementById('done-cta').innerHTML =
      `<button class="btn-primary" onclick="startCards()">שוב מהתחלה</button>` +
      `<button class="btn-secondary" onclick="goHome()">בחר נושא אחר</button>`;
  }
}

// ── PROGRESS ──
function updateProgress() {
  const pct = roundTotal ? ((seen-1)/roundTotal)*100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = seen + ' / ' + roundTotal;
}
function updateScoreRow() {
  document.getElementById('score-row').style.display = mode==='quiz' ? 'flex' : 'none';
  document.getElementById('score-correct').textContent = scores.correct;
  document.getElementById('score-wrong').textContent = scores.wrong;
}

// ── ANIMATIONS ──
function showCheckmark() {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:200;';
  el.innerHTML = `<div style="font-size:180px;color:#4caf50;animation:checkPop 0.9s ease forwards;line-height:1">✓</div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function showWrongPopup(name) {
  const existing = document.getElementById('wrong-popup'); if (existing) existing.remove();
  const xEl = document.createElement('div');
  xEl.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:200;';
  xEl.innerHTML = `<div style="font-size:150px;color:#e53935;animation:xPop 0.9s ease forwards;line-height:1">✕</div>`;
  document.body.appendChild(xEl);
  setTimeout(() => xEl.remove(), 900);
  const bar = document.createElement('div');
  bar.id = 'wrong-popup';
  bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:300;padding:12px 16px;background:#c62828;display:flex;align-items:center;gap:12px;';
  bar.innerHTML = `<div style="flex:1;text-align:right"><div style="font-size:10px;color:#666;margin-bottom:2px">התשובה הנכונה</div><div style="font-size:16px;font-weight:700;color:#fff">${name}</div></div>`;
  document.body.appendChild(bar);
}

// ── SWIPE: שתי אצבעות = הפוך כרטיסיה ──
let swipeStartX = 0, swipeStartY = 0, isSwiping = false;
let panOriginX = 0, panOriginY = 0, panStartX = 0, panStartY = 0;
let twoFingerStartX = 0, twoFingerActive = false;
const cardWrap = document.getElementById('card-wrap');

cardWrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2 && mode === 'flash' && zoomScale <= 1.05) {
    twoFingerStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    twoFingerActive = true;
  }
  if (e.touches.length === 1) {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
    isSwiping = false;
    if (zoomScale > 1) {
      panOriginX = e.touches[0].clientX;
      panOriginY = e.touches[0].clientY;
      panStartX = panX;
      panStartY = panY;
    }
  }
}, {passive:true});

cardWrap.addEventListener('touchmove', e => {
  if (e.touches.length !== 1 || zoomScale > 1) return;
  const dx = e.touches[0].clientX - swipeStartX;
  const dy = e.touches[0].clientY - swipeStartY;
  if (!isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 12) isSwiping = true;
  if (isSwiping) e.preventDefault();
}, {passive:false});

cardWrap.addEventListener('touchend', e => {
  if (twoFingerActive && e.touches.length < 2 && mode === 'flash' && zoomScale <= 1.05) {
    const endX = e.changedTouches[0].clientX;
    const dx = endX - twoFingerStartX;
    if (Math.abs(dx) > 30) {
      document.getElementById('card-wrap').classList.toggle('flipped');
    }
    twoFingerActive = false;
    return;
  }
  twoFingerActive = false;
  isSwiping = false;
}, {passive:true});

// ── ZOOM (scroll wheel on desktop) ──
let zoomScale = 1, panX = 0, panY = 0, rotation = 0;
let lastDist = null, lastMidX = 0, lastMidY = 0, lastAngle = null;
let isPinching = false, pinchStarted = false;

function getImg() { return document.getElementById('card-img'); }
function applyZoom() {
  const img = getImg(); if (!img) return;
  img.style.transform = `translate(${panX}px,${panY}px) scale(${zoomScale}) rotate(${rotation}deg)`;
}
function resetZoom() {
  zoomScale = 1; panX = 0; panY = 0; rotation = 0;
  const img = getImg(); if (img) img.style.transform = '';
}

// scroll wheel zoom
cardWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  const newScale = Math.min(6, Math.max(1, zoomScale * factor));
  if (newScale === 1) { resetZoom(); return; }
  // zoom toward cursor
  const rect = cardWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left - rect.width/2;
  const my = e.clientY - rect.top - rect.height/2;
  panX = mx - (mx - panX) * (newScale / zoomScale);
  panY = my - (my - panY) * (newScale / zoomScale);
  zoomScale = newScale;
  const mp = 300 * (zoomScale - 1);
  panX = Math.max(-mp, Math.min(mp, panX));
  panY = Math.max(-mp, Math.min(mp, panY));
  applyZoom();
}, {passive:false});

// mouse drag when zoomed
let mouseDragging = false, mousePanSX = 0, mousePanSY = 0, mousePanStartX = 0, mousePanStartY = 0;
cardWrap.addEventListener('mousedown', e => {
  if (zoomScale > 1) { mouseDragging = true; mousePanSX = panX; mousePanSY = panY; mousePanStartX = e.clientX; mousePanStartY = e.clientY; e.preventDefault(); }
});
document.addEventListener('mousemove', e => {
  if (!mouseDragging) return;
  const mp = 200 * (zoomScale - 1);
  panX = Math.max(-mp, Math.min(mp, mousePanSX + (e.clientX - mousePanStartX)));
  panY = Math.max(-mp, Math.min(mp, mousePanSY + (e.clientY - mousePanStartY)));
  applyZoom();
});
document.addEventListener('mouseup', () => { mouseDragging = false; });

// double click to zoom
cardWrap.addEventListener('dblclick', e => {
  if (zoomScale > 1.05) { resetZoom(); return; }
  const rect = cardWrap.getBoundingClientRect();
  const tx = e.clientX - rect.left - rect.width/2;
  const ty = e.clientY - rect.top - rect.height/2;
  zoomScale = 3;
  panX = -tx * (3-1) * 0.5;
  panY = -ty * (3-1) * 0.5;
  applyZoom();
  if (!hintShown) {
    hintShown = true;
    localStorage.setItem('pictour_hint','1');
    const h = document.getElementById('hint-row');
    if (h) h.classList.add('used');
  }
});

// ── PINCH ZOOM (touch) ──
function tDist(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
function tMid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2};}
function tAngle(t){return Math.atan2(t[1].clientY-t[0].clientY,t[1].clientX-t[0].clientX)*180/Math.PI;}

cardWrap.addEventListener('touchstart', e => {
  if (e.touches.length===2){isPinching=true;pinchStarted=false;e.preventDefault();}
},{passive:false});
cardWrap.addEventListener('touchmove', e => {
  if (e.touches.length===2){
    e.preventDefault();
    const d=tDist(e.touches),m=tMid(e.touches),a=tAngle(e.touches);
    if(!pinchStarted){lastDist=d;lastMidX=m.x;lastMidY=m.y;lastAngle=a;pinchStarted=true;return;}
    zoomScale=Math.min(6,Math.max(1,zoomScale*(d/lastDist)));
    panX+=m.x-lastMidX;panY+=m.y-lastMidY;
    const mp=300*(zoomScale-1);
    panX=Math.max(-mp,Math.min(mp,panX));panY=Math.max(-mp,Math.min(mp,panY));
    rotation+=(a-lastAngle);
    applyZoom();
    lastDist=d;lastMidX=m.x;lastMidY=m.y;lastAngle=a;
  }
  if(e.touches.length===1&&zoomScale>1&&!isSwiping){
    e.preventDefault();
    const dx=e.touches[0].clientX-panOriginX,dy=e.touches[0].clientY-panOriginY;
    const mp=200*(zoomScale-1);
    panX=Math.max(-mp,Math.min(mp,panStartX+dx));
    panY=Math.max(-mp,Math.min(mp,panStartY+dy));
    applyZoom();
  }
},{passive:false});
cardWrap.addEventListener('touchend',e=>{
  if(e.touches.length<2){lastDist=null;lastAngle=null;setTimeout(()=>{isPinching=false;},50);}
  if(zoomScale<1)resetZoom();
});

// double tap (touch)
let lastTap = 0;
cardWrap.addEventListener('touchend', e => {
  if (isPinching||e.touches.length>0) return;
  const now = Date.now();
  const touch = e.changedTouches[0];
  if (now - lastTap < 280) {
    e.preventDefault();
    if (!hintShown) {
      hintShown = true;
      localStorage.setItem('pictour_hint','1');
      const h = document.getElementById('hint-row');
      if (h) h.classList.add('used');
    }
    if (zoomScale > 1.05) { resetZoom(); }
    else {
      const rect = cardWrap.getBoundingClientRect();
      const tx = touch.clientX - rect.left - rect.width/2;
      const ty = touch.clientY - rect.top - rect.height/2;
      zoomScale = 3; panX = -tx*(3-1)*0.5; panY = -ty*(3-1)*0.5;
      applyZoom();
    }
  } else if (mode==='flash' && zoomScale<=1.05 && !isSwiping) {
    setTimeout(() => {
      if (Date.now()-lastTap > 260) document.getElementById('card-wrap').classList.toggle('flipped');
    }, 270);
  }
  lastTap = now;
},{passive:false});

// keyboard
document.addEventListener('keydown', e => {
  if (!document.getElementById('app-screen').classList.contains('active')) return;
  if (e.key===' '&&mode==='flash') document.getElementById('card-wrap').classList.toggle('flipped');
  if (e.key==='ArrowRight'&&mode==='flash') document.getElementById('card-wrap').classList.toggle('flipped');
  if (e.key==='ArrowLeft'&&mode==='flash') document.getElementById('card-wrap').classList.remove('flipped');
  if (e.key==='Escape'&&zoomScale>1) resetZoom();
});

if (hintShown) {
  const h = document.getElementById('hint-row');
  if (h) h.classList.add('used');
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

loadTopics();
</script>
